name: Scorecard

on:
  branch_protection_rule:
  schedule:
    ## Cron slot owned by this repo. Org allocation:
    ##   derivative-maker:  '0 4 * * 0'
    ##   helper-scripts:    '30 4 * * 0'
    ##   kloak:             '0 5 * * 0'
    ##   security-misc:     '30 5 * * 0'
    ##   tb-updater:        '0 6 * * 0'
    ##   msgcollector:      '30 6 * * 0'
    ##   whonix-firewall:   '0 7 * * 0'
    ##   Whonix-Installer:  '30 7 * * 0'
    ##   usability-misc:    '0 8 * * 0'
    ##   genmkfile:         '30 8 * * 0'
    ##   Whonix-Starter:    '0 9 * * 0'
    - cron: '0 6 * * 0'
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    uses: org-ai-assisted/developer-meta-files/.github/workflows/reusable-scorecard.yml@master
    permissions:
      security-events: write
      contents: read
      actions: read
